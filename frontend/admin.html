<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - ShopACC</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .admin-panel { padding: 30px 0; }
    .admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .stat-card h4 { color: #6c757d; }
    .stat-card .number { font-size: 2rem; font-weight: bold; color: #1a1a2e; }
    .admin-tabs { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
    .admin-tabs button { padding: 10px 25px; border: none; background: #e9ecef; border-radius: 5px; cursor: pointer; font-weight: 600; }
    .admin-tabs button.active { background: #1a1a2e; color: white; }
    .tab-content { display: none; background: white; padding: 20px; border-radius: 10px; }
    .tab-content.active { display: block; }
    table { width: 100%; border-collapse: collapse; }
    table th, table td { padding: 10px; border-bottom: 1px solid #dee2e6; text-align: left; }
    table th { background: #f8f9fa; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 5px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
    .btn-sm { padding: 5px 12px; font-size: 0.85rem; }
  </style>
</head>
<body>
  <header>
    <div class="container header-container">
      <div class="logo"><h1>SHOPACC ADMIN</h1></div>
      <nav><a href="index.html">Trang chủ</a></nav>
      <div><span id="admin-user"></span> <button id="admin-logout" class="btn btn-secondary btn-sm">Đăng xuất</button></div>
    </div>
  </header>

  <section class="admin-panel container">
    <h2>Quản trị hệ thống</h2>

    <!-- Thống kê -->
    <div class="admin-stats" id="stats-container">
      <div class="stat-card"><h4>Tổng người dùng</h4><div class="number" id="stat-users">0</div></div>
      <div class="stat-card"><h4>Tổng sản phẩm</h4><div class="number" id="stat-products">0</div></div>
      <div class="stat-card"><h4>Tổng đơn hàng</h4><div class="number" id="stat-orders">0</div></div>
      <div class="stat-card"><h4>Doanh thu</h4><div class="number" id="stat-revenue">0 ₫</div></div>
    </div>

    <!-- Tabs -->
    <div class="admin-tabs">
      <button class="active" data-tab="tab-products">Sản phẩm</button>
      <button data-tab="tab-orders">Đơn hàng</button>
      <button data-tab="tab-users">Người dùng</button>
    </div>

    <!-- Tab: Sản phẩm -->
    <div id="tab-products" class="tab-content active">
      <h3>Quản lý sản phẩm</h3>
      <button class="btn btn-primary" id="add-product-btn">+ Thêm sản phẩm</button>
      <div id="product-form-container" style="display:none; margin-top:15px; background:#f8f9fa; padding:15px; border-radius:8px;">
        <h4 id="form-title">Thêm sản phẩm</h4>
        <form id="product-form">
          <input type="hidden" id="edit-product-id" />
          <div class="form-group"><label>Tên sản phẩm</label><input id="p-name" required /></div>
          <div class="form-group">
            <label>Game</label>
            <select id="p-game"><option>Free Fire</option><option>Liên Quân</option><option>GARCONT</option><option>Roblox</option><option>Minecraft</option><option>Khác</option></select>
          </div>
          <div class="form-group"><label>Giá (VNĐ)</label><input id="p-price" type="number" required /></div>
          <div class="form-group"><label>Giá gốc (nếu có)</label><input id="p-original" type="number" /></div>
          <div class="form-group"><label>Giảm giá (%)</label><input id="p-discount" type="number" min="0" max="100" /></div>
          <div class="form-group"><label>Số lượng</label><input id="p-stock" type="number" min="0" /></div>
          <div class="form-group"><label>Mô tả</label><textarea id="p-desc" rows="3"></textarea></div>
          <button type="submit" class="btn btn-primary">Lưu</button>
          <button type="button" class="btn btn-secondary" id="cancel-product-form">Hủy</button>
        </form>
      </div>
      <table id="product-table">
        <thead><tr><th>Tên</th><th>Game</th><th>Giá</th><th>Giảm</th><th>Tồn</th><th>Thao tác</th></tr></thead>
        <tbody id="product-table-body"></tbody>
      </table>
    </div>

    <!-- Tab: Đơn hàng -->
    <div id="tab-orders" class="tab-content">
      <h3>Quản lý đơn hàng</h3>
      <table>
        <thead><tr><th>ID</th><th>Người mua</th><th>Tổng</th><th>Trạng thái</th><th>Thanh toán</th><th>Hành động</th></tr></thead>
        <tbody id="order-table-body"></tbody>
      </table>
    </div>

    <!-- Tab: Người dùng -->
    <div id="tab-users" class="tab-content">
      <h3>Quản lý người dùng</h3>
      <table>
        <thead><tr><th>Tên</th><th>Email</th><th>Vai trò</th><th>Số dư</th><th>Nạp tiền</th><th>Đổi role</th></tr></thead>
        <tbody id="user-table-body"></tbody>
      </table>
    </div>
  </section>

  <script src="js/admin.js"></script>
</body>
  </html>
